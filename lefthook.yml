pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: '*.{js,ts,jsx,tsx}'
      run: pnpm exec vp lint {staged_files}

    - name: format
      glob: '*.{js,ts,jsx,tsx,json,css,html,md,yml,yaml}'
      run: pnpm exec vp fmt --check {staged_files}

    - name: typecheck
      glob: '*.{ts,tsx}'
      # --noEmit ではなく --build を使う理由:
      # monorepo の project references を辿るには --build が必要で、
      # --build は emit 前提のため --noEmit と併用すると TS6310 エラーになる。
      run: pnpm typecheck
